name: Deployment
on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:

  caddyfile-lint:
      runs-on: ubuntu-latest
      steps:
        - uses: actions/checkout@v4

        - name: Sanity check file exists
          run: |
            ls -la
            test -f Caddyfile

        - name: Check Caddyfile format and validate
          run: |
            docker run --rm -v "${{ github.workspace }}:/work" -w /work caddy:2 \
              caddy fmt --diff --config Caddyfile | tee /tmp/diff
            if [ -s /tmp/diff ]; then
              echo "::error::Caddyfile is not formatted. Run 'caddy fmt --overwrite Caddyfile'."
              exit 1
            fi

            docker run --rm -v "${{ github.workspace }}:/work" -w /work caddy:2 \
              caddy validate --adapter caddyfile --config Caddyfile

  deploy:
    runs-on: ubuntu-latest
    needs: caddyfile-lint
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SERVER_HOST_SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

      - name: Add remote host to known_hosts
        run: |
          ssh-keyscan -H ${{ secrets.SERVER_HOST_IP }} >> ~/.ssh/known_hosts

      - name: Set up Docker context for prod
        run: |
          docker context create prod-server \
            --docker "host=ssh://${{ secrets.SERVER_HOST_USER }}@${{ secrets.SERVER_HOST_IP }}" \
            --description "Prod server context"
          docker context use prod-server

      - name: Deploy to Remote Prod Server
        run: |
          echo "Deploying to Prod Server..."

          docker compose -f docker-compose.yml up -d --build --no-deps --force-recreate

        env:
          YOUNGNEBULA_COM_CF_API_TOKEN: ${{ secrets.YOUNGNEBULA_COM_CF_API_TOKEN }}
