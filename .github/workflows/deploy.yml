name: Deployment
on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  caddyfile-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Locate Caddyfile
        id: locate
        run: |
          set -euo pipefail
          if [ -f Caddyfile ]; then
            echo "path=Caddyfile" >> "$GITHUB_OUTPUT"
          elif [ -f reverse-proxy/Caddyfile ]; then
            echo "path=reverse-proxy/Caddyfile" >> "$GITHUB_OUTPUT"
          else
            echo "::error::No Caddyfile found at repo root or reverse-proxy/."
            exit 1
          fi
          echo "Found: ${{ steps.locate.outputs.path }}"

      - name: Format check (no changes allowed)
        run: |
          set -euo pipefail
          CFG="${{ steps.locate.outputs.path }}"
          # Pin to a known Caddy version; update to match your prod image tag
          IMG="ghcr.io/caddybuilds/caddy-cloudflare:latest"

          # Write formatted output to a temp file
          docker run --rm -v "${{ github.workspace }}:/work" -w /work "$IMG" \
            sh -lc "caddy fmt --config \"$CFG\"" > /tmp/Caddyfile.formatted

          # Normalize line endings in case of CRLF sneaking in
          tr -d '\r' < "$CFG" > /tmp/Caddyfile.repo

          # Show differences (if any) and fail if they exist
          if ! diff -u /tmp/Caddyfile.repo /tmp/Caddyfile.formatted > /tmp/caddyfmt.diff; then
            echo "::group::caddy fmt differences"
            cat /tmp/caddyfmt.diff
            echo "::endgroup::"
            echo "::error::Caddyfile is not formatted. Run: caddy fmt --overwrite $CFG"
            exit 1
          fi
          echo "Caddyfile formatting OK."

  deploy:
    runs-on: ubuntu-latest
    needs: caddyfile-lint
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SERVER_HOST_SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

      - name: Add remote host to known_hosts
        run: |
          ssh-keyscan -H ${{ secrets.SERVER_HOST_IP }} >> ~/.ssh/known_hosts

      - name: Set up Docker context for prod
        run: |
          docker context create prod-server \
            --docker "host=ssh://${{ secrets.SERVER_HOST_USER }}@${{ secrets.SERVER_HOST_IP }}" \
            --description "Prod server context"
          docker context use prod-server

      - name: Deploy to Remote Prod Server
        run: |
          echo "Deploying to Prod Server..."

          docker compose -f docker-compose.yml up -d --build --no-deps --force-recreate

        env:
          YOUNGNEBULA_COM_CF_API_TOKEN: ${{ secrets.YOUNGNEBULA_COM_CF_API_TOKEN }}
