name: Caddyfile Lint

on:
  pull_request:
    paths: ["Caddyfile", "**/Caddyfile"]
  push:
    branches: [main]
    paths: ["Caddyfile", "**/Caddyfile"]

jobs:
  caddyfile-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Optional: matrix over multiple Caddyfiles if you keep several
      - name: Find Caddyfiles
        id: files
        run: |
          mapfile -t files < <(git ls-files | grep -E '(^|/)(Caddyfile)$' || true)
          if [ ${#files[@]} -eq 0 ]; then
            echo "No Caddyfile found; nothing to do."
            exit 0
          fi
          printf '%s\n' "${files[@]}" | jq -R . | jq -s '{list: .}' > files.json
          echo "files=$(cat files.json)" >> "$GITHUB_OUTPUT"

      - name: Check format and validate
        if: steps.files.outputs.files != ''
        run: |
          set -euo pipefail
          files=$(jq -r '.list[]' <<< '${{ steps.files.outputs.files }}')

          # Use the official caddy image to run commands against your files
          failed=0
          for f in $files; do
            echo "::group::Format check for $f"
            # --diff prints differences if reformatting is needed; empty output means OK
            DIFF_OUTPUT=$(docker run --rm -v "$PWD:/work" -w /work caddy:2 \
              caddy fmt --diff --config "$f")
            if [ -n "$DIFF_OUTPUT" ]; then
              echo "$DIFF_OUTPUT"
              echo "::error file=$f::Caddyfile is not formatted. Run 'caddy fmt --overwrite --config $f'."
              failed=1
            else
              echo "OK: $f formatting"
            fi
            echo "::endgroup::"

            echo "::group::Validate $f"
            # Validate semantics (parses + provisions without starting)
            docker run --rm -v "$PWD:/work" -w /work caddy:2 \
              caddy validate --adapter caddyfile --config "$f"
            echo "::endgroup::"
          done

          exit $failed
